<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELSA BAT</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:white;
}

header h1 {
  color:#C9A23F;
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:#111;
}

/* HERO */
.hero {
  display:flex;
  padding:80px 40px;
  background:white;
  align-items:center;
}

.hero-text {
  width:50%;
}

.hero-text h1 {
  font-size:50px;
}

.hero-text span {
  color:#C9A23F;
}

.hero-img {
  width:50%;
}

.hero-img img {
  width:100%;
  border-radius:10px;
}

.btn {
  background:#1E5EFF;
  color:white;
  padding:15px 25px;
  display:inline-block;
  border-radius:8px;
  margin-top:20px;
  text-decoration:none;
}

/* SERVICES */
.services {
  padding:60px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h1>ELSA BAT</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>ELSA BAT</h1>
    <span>PLÂTRERIE - RÉNOVATION</span>
    <p>Travaux intérieurs • Clé en main • Certifié RGE</p>

    <ul>
      <li>Plâtrerie</li>
      <li>Démolition</li>
      <li>Isolation</li>
      <li>Rénovation</li>
      <li>Peinture</li>
    </ul>

    <a href="#" class="btn">Demander un devis</a>
  </div>

  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
  </div>
</section>

<section class="services">
  <h2>Nos services</h2>
  <div class="grid">
    <div class="card">Plâtrerie</div>
    <div class="card">Démolition</div>
    <div class="card">Isolation</div>
    <div class="card">Rénovation</div>
    <div class="card">Peinture</div>
  </div>
</section>

</body>
</html>
